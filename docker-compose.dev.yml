services:
  db:
    image: postgres:16-alpine
    container_name: olfke-be-db-dev
    restart: unless-stopped
    environment:
      - POSTGRES_USER=olfke
      - POSTGRES_PASSWORD=devpassword
      - POSTGRES_DB=olfke
    ports:
      - "5433:5432"
    volumes:
      - olfke_dev_data:/var/lib/postgresql/data

volumes:
  olfke_dev_data:
