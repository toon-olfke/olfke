services:
  app:
    image: toonolfke/olfke-be:latest
    container_name: olfke-be
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://olfke:${POSTGRES_PASSWORD}@db:5432/olfke
      - ORIGIN=${ORIGIN}
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3010:3000"

  db:
    image: postgres:16-alpine
    container_name: olfke-be-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=olfke
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=olfke
    volumes:
      - olfke_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olfke"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  olfke_postgres_data:
